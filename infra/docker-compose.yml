version: "3.9"
services:
  api:
    image: python:3.12-slim
    working_dir: /app
    command: ["bash", "-lc", "echo API scaffold pending && sleep infinity"]
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    volumes:
      - ../apps/api:/app
      - workout_data:/data

volumes:
  workout_data:

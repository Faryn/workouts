services:
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    environment:
      APP_ENV: production
      APP_BASE_URL: http://localhost
      DATABASE_URL: sqlite:////data/app.db
      API_TOKEN_SECRET: change-me
      TRUSTED_PROXY: 172.16.0.0/12
      EXPORT_PATH: /data/exports
    volumes:
      - workout_data:/data
    expose:
      - "8080"
    restart: unless-stopped

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "8088:80"
    restart: unless-stopped

volumes:
  workout_data:
